<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>purrbit</title>
		<link rel="stylesheet" href="../style.css" />
		<script src="../scripts/audio.js" defer></script>
        <script src="../scripts/create.js" type="module" defer></script>
		<style>
			h1 {
				font-size: small;
				padding: 5px 10px;
			}
			p {
				font-size: x-small;
				padding: 5px 10px;
			}

			body {
				justify-content: space-evenly;
			}

			input {
				width: 90%;
				height: 25px;
				margin: 10px;
				font-size: small;
				padding: 5px;
			}

			.header {
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<h1>welcome to purrbit!</h1>
			<p>name your kitty!</p>
		</div>
		<form id="name-form">
			<input
				id="name"
				name="name"
				type="text"
				placeholder="krinkles"
				required
			/>
			<input type="submit" value="next" />
		</form>
	</body>
</html>
