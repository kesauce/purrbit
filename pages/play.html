<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>purrbit</title>
		<link rel="stylesheet" href="../style.css" />
		<script src="../scripts/audio.js" defer></script>
		<script src="../scripts/play.js" type="module" defer></script>
		<style>
			body {
				text-align: center;
			}

			.header {
				padding: 20px 10px;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
			}

			.main-content {
				padding: 5px 10px;
				display: flex;
				flex-direction: column;
				gap: 5px;
			}

			#timer, #game-timer {
				font-size: xx-small;
				padding: 5px 10px;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<div id="game-timer">2:00</div>
			<h1>Happiness: <span id="score"></span></h1>
			<p id="subtitle">Get ready!</p>
		</div>
		<div class="main-content">
        <div id="timer">Time: 5</div>
        <div id="typing-game">
            <p id="word-display"></p>
            <input type="text" id="word-input" placeholder="type here..." />
        </div>

		<div id="math-game">
            <p id="equation-display"></p>
            <input type="text" id="math-input" placeholder="answer..." />
        </div>
		</div>
		<div class="bottom-nav">
			<p id="feedback"></p>
			<div class="icon-container">
				<img src="../assets/icons/back.png" id="back-button"/>
			</div>
		</div>
	</body>
</html>
